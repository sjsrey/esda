name: test
channels:
  - conda-forge
dependencies:
  - python=3.14
  # required
  - geopandas
  - libpysal>=4.12
  - numpy
  - pandas
  - scikit-learn
  - scipy
  - shapely
  # testing
  - codecov
  - folium
  - mapclassify
  - matplotlib
  - seaborn
  - pytest
  - pytest-cov
  - pytest-xdist
  - geodatasets
  # optional
  - rtree
  - numba
  - contextily
  - ipywidgets
  - statsmodels
  # doc build
  - nbsphinx
  - numpydoc
  - pandoc
  - sphinx
  - sphinxcontrib-bibtex
  - sphinx_bootstrap_theme
  - pip
  - pip:
      - -e .
      - myst-parser
      - sphinx-book-theme
      - myst-nb
      - sphinx-copybutton
      - sphinx-immaterial
      - watermark
